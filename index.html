    <p>Welcome to 1Mpx</p>
    <p><span id="pxMove">0</span> / 1000000 px<br>on mousemove</p>

<script>
    pxMove = 0;
    onselectstart = function () { return false; }
    onmousemove = function () {
        pxMove += 1;
        if (pxMove == 1e6) { alert("Finished!\nqqgroup{894656456}") };
        document.getElementById("pxMove").innerHTML = pxMove;
    }
